        animation-delay: 0.3s;
      }

        animation-delay: 0.34s;
      }

      }

      // -----------------------------------------------------------------------

      const USER_KEY = "rajateats:user";

      const makeId = (prefix) =>
        `${prefix}_${Math.random().toString(36).slice(2, 10)}${Date.now().toString(36)}`;

      function getOrCreateUser() {
        const raw = localStorage.getItem(USER_KEY);
        if (raw) {
          try { return JSON.parse(raw); } catch {}
        }
        const u = { id: makeId("u"), name: "Guest Foodie" };
        localStorage.setItem(USER_KEY, JSON.stringify(u));
        return u;
      }
      function updateUser(patch) {
        const cur = getOrCreateUser();
        const next = { ...cur, ...patch };
        localStorage.setItem(USER_KEY, JSON.stringify(next));
        return next;

      function loadCart() {
        const raw = localStorage.getItem(CART_KEY);
        if (!raw) return { items: [], restaurantId: null };
        try { return JSON.parse(raw); } catch { return { items: [], restaurantId: null }; }
      }
      function saveCart(c) {
        localStorage.setItem(CART_KEY, JSON.stringify(c));
        window.dispatchEvent(new CustomEvent("cart-updated"));
      }
      const cart = {
        get state() { return loadCart(); },
        add(item) {
          const s = loadCart();
          if (s.restaurantId && s.restaurantId !== item.restaurantId) {
            saveCart({
              restaurantId: item.restaurantId,
              items: [{ menuItemId: item.id, name: item.name, price: item.price, quantity: 1, image: item.image, isVeg: item.isVeg, restaurantId: item.restaurantId }],
            });
            toast(`Cart cleared and ${item.name} added`);
            return;
          }
          const ex = s.items.find((i) => i.menuItemId === item.id);
          if (ex) {
            ex.quantity += 1;
          } else {
            s.items.push({ menuItemId: item.id, name: item.name, price: item.price, quantity: 1, image: item.image, isVeg: item.isVeg, restaurantId: item.restaurantId });
          }
          s.restaurantId = item.restaurantId;
          saveCart(s);
        },
        decrement(menuItemId) {
          const s = loadCart();
          const ex = s.items.find((i) => i.menuItemId === menuItemId);
          if (!ex) return;
          if (ex.quantity <= 1) {
            s.items = s.items.filter((i) => i.menuItemId !== menuItemId);
            if (!s.items.length) s.restaurantId = null;
          } else ex.quantity -= 1;
          saveCart(s);
        },
        remove(menuItemId) {
          const s = loadCart();
          s.items = s.items.filter((i) => i.menuItemId !== menuItemId);
          if (!s.items.length) s.restaurantId = null;
          saveCart(s);
        },
        clear() { saveCart({ items: [], restaurantId: null }); },
        count() { return loadCart().items.reduce((sum, i) => sum + i.quantity, 0); },
        subtotal() { return loadCart().items.reduce((sum, i) => sum + i.price * i.quantity, 0); },

          const rmap = {};
          for (const r of SEED_RESTAURANTS) rmap[r.id] = r;
          await set(ref(rtdb, "restaurants"), rmap);
          const mmap = {};
          for (const m of SEED_MENU_ITEMS) mmap[m.id] = m;
          await set(ref(rtdb, "menuItems"), mmap);
          await set(ref(rtdb, "seedVersion"), SEED_VERSION);
        })();
        return seedPromise;
      }

      function computeTrustScore(orders, tickets) {
        const completed = orders.filter((o) => o.status === "delivered").length;
        const cancelled = orders.filter((o) => o.status === "cancelled").length;
        const totalOrders = orders.length;
        const ticketRate = totalOrders ? tickets.length / totalOrders : 0;
        let score = 70;
        score += Math.min(completed * 4, 30);
        score -= cancelled * 5;
        score -= Math.round(ticketRate * 25);
        score = Math.max(20, Math.min(100, score));
        return Math.round(score);
      }
      function trustBadge(score, totalOrders) {
        if (totalOrders === 0) return { label: "First-time customer", color: "bg-amber-100 text-amber-700 border-amber-200" };

        if (score >= 60) return { label: "Regular customer", color: "bg-blue-100 text-blue-700 border-blue-200" };
        return { label: "Needs attention", color: "bg-red-100 text-red-700 border-red-200" };
      }

            const order_value = { placed: 0, preparing: 1, out_for_delivery: 2, delivered: 3, cancelled: -1 };
            for (const o of Object.values(s.val())) {
              if (o.userId !== userId) continue;
              if (o.status === "delivered" || o.status === "cancelled") continue;
              const e = Date.now() - o.createdAt;
              let target = "placed";
              if (e >= 60000) target = "delivered";
              else if (e >= 22000) target = "out_for_delivery";
              else if (e >= 6000) target = "preparing";
              if (order_value[target] > order_value[o.status]) {
                await update(ref(rtdb, `orders/${o.id}`), { status: target });
              }
            }

      function navigate(hash) {

      function parseRoute() {
        const h = location.hash.replace(/^#\/?/, "") || "";
        const [pathPart, queryPart] = h.split("?");
        const segments = pathPart.split("/").filter(Boolean);
        const query = {};
        if (queryPart) {
          for (const pair of queryPart.split("&")) {
            const [k, v] = pair.split("=");
            query[decodeURIComponent(k)] = decodeURIComponent(v ?? "");
          }
        }
        return { segments, query };
      }

        if (currentCleanup) {
          try { currentCleanup(); } catch {}
          currentCleanup = null;

        const { segments, query } = parseRoute();

        if (route) {

      async function renderRestaurant(id) {
        shell({
          content: `<div id="rest-page" class="max-w-5xl mx-auto px-4 sm:px-6 py-8"><div class="text-ink-500 text-center py-12">Loading menu...</div></div>`,
        });

          $("#rest-page").innerHTML = `<div class="text-center py-12 text-ink-500">Restaurant not found. <a href="#/" class="text-brand-600 underline">Go home</a></div>`;
          return;
        }
        const menu = await fetchMenu(id);
        const categories = [...new Set(menu.map((m) => m.category))];

        $("#rest-page").innerHTML = `
          <a href="#/" class="inline-flex items-center gap-2 text-ink-500 hover:text-ink-800 font-semibold mb-4 anim-slide">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>

            <img src="${r.image}" class="w-full h-56 sm:h-72 object-cover" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>
            <div class="absolute bottom-5 left-5 text-white">

              <div class="opacity-90 text-sm sm:text-base">${escapeHtml(r.cuisine)}</div>

          <div class="bg-white border border-ink-100 rounded-2xl p-4 flex flex-wrap items-center gap-5 mb-6 anim-fade-up">
            <div class="flex items-center gap-2 font-semibold">
              <span class="bg-green-100 text-green-700 px-2 py-0.5 rounded">★ ${r.rating}</span>
              <span class="text-ink-500">${r.deliveryTimeMin} mins</span>
              <span class="text-ink-300">•</span>
              <span class="text-ink-500">${fmt(r.costForTwo)} for two</span>

          </div>

          <div class="flex flex-col sm:flex-row gap-3 mb-6 anim-fade-up">
            <input id="menu-search" placeholder="Search this menu..." class="flex-1 px-4 py-3 rounded-xl bg-white border border-ink-100 outline-none ring-glow" />
            <label class="flex items-center gap-2 bg-white border border-ink-100 rounded-xl px-4 py-3">
              <input id="veg-only" type="checkbox" class="accent-green-600" />
              <span class="text-sm font-semibold text-ink-700">Veg only</span>
            </label>
          </div>

          <div id="menu-list" class="space-y-10 stagger"></div>
        `;

        function renderMenuList() {
          const q = ($("#menu-search").value || "").toLowerCase().trim();
          const vegOnly = $("#veg-only").checked;
          const filtered = menu.filter((m) =>
            (!q || m.name.toLowerCase().includes(q) || m.description.toLowerCase().includes(q)) &&
            (!vegOnly || m.isVeg),
          );
          const list = $("#menu-list");
          if (!filtered.length) {
            list.innerHTML = `<div class="text-center py-12 text-ink-500">No items match your filters.</div>`;
            return;
          }
          list.innerHTML = categories.map((cat) => {
            const items = filtered.filter((m) => m.category === cat);
            if (!items.length) return "";
            return `
              <div>
                <h3 class="font-display font-bold text-xl mb-4 flex items-center gap-3">
                  ${escapeHtml(cat)} <span class="text-sm text-ink-400 font-normal">${items.length} item${items.length > 1 ? "s" : ""}</span>
                </h3>
                <div class="space-y-3">
                  ${items.map((m) => menuItemCard(m)).join("")}
                </div>
              </div>`;
          }).join("");
        }

        function menuItemCard(m) {
          const qty = cart.quantityFor(m.id);
          return `
            <div class="bg-white border border-ink-100 rounded-2xl p-4 flex gap-4 card-hover">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <span class="${m.isVeg ? "veg-dot" : "nonveg-dot"}"></span>
                  ${m.bestseller ? `<span class="text-[10px] font-bold uppercase tracking-wide text-amber-700 bg-amber-100 rounded px-1.5 py-0.5">Bestseller</span>` : ""}
                </div>
                <div class="font-bold text-ink-800 mt-1">${escapeHtml(m.name)}</div>
                <div class="text-sm text-ink-500 mt-1 line-clamp-2">${escapeHtml(m.description)}</div>
                <div class="font-bold text-ink-800 mt-2">${fmt(m.price)}</div>
              </div>
              <div class="flex flex-col items-end gap-2">
                <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-xl overflow-hidden">
                  <img src="${m.image}" class="w-full h-full object-cover" />
                </div>
                ${qty > 0 ? `
                  <div class="flex items-center bg-white border-2 border-brand-500 rounded-lg overflow-hidden">
                    <button data-dec="${m.id}" class="px-3 py-1.5 text-brand-600 font-bold hover:bg-brand-50">−</button>
                    <span class="px-3 font-bold text-brand-600">${qty}</span>
                    <button data-inc='${escapeHtml(JSON.stringify(m))}' class="px-3 py-1.5 text-brand-600 font-bold hover:bg-brand-50">+</button>
                  </div>
                ` : `
                  <button data-add='${escapeHtml(JSON.stringify(m))}' class="border-2 border-brand-500 text-brand-600 font-bold uppercase text-sm px-5 py-1.5 rounded-lg hover:bg-brand-50 transition">Add</button>
                `}
              </div>
            </div>`;
        }

        renderMenuList();

        $("#menu-search").addEventListener("input", renderMenuList);
        $("#veg-only").addEventListener("change", renderMenuList);
        $("#menu-list").addEventListener("click", (ev) => {
          const addBtn = ev.target.closest("[data-add]");
          if (addBtn) {
            const m = JSON.parse(addBtn.getAttribute("data-add"));
            cart.add(m);
            renderMenuList();
            renderFloatingCart();
            return;
          }
          const incBtn = ev.target.closest("[data-inc]");
          if (incBtn) {
            const m = JSON.parse(incBtn.getAttribute("data-inc"));
            cart.add(m);
            renderMenuList();
            renderFloatingCart();
            return;
          }
          const decBtn = ev.target.closest("[data-dec]");
          if (decBtn) {
            cart.decrement(decBtn.getAttribute("data-dec"));
            renderMenuList();
            renderFloatingCart();
          }
        });
        renderFloatingCart();
      }

      function renderFloatingCart() {
        const existing = document.getElementById("floating-cart");

        if (cart.count() === 0) return;
        const el = document.createElement("div");
        el.id = "floating-cart";
        el.className =

        el.innerHTML = `
          <button onclick="navigate('#/cart')" class="w-full btn-primary px-5 py-4 rounded-2xl flex items-center justify-between shadow-2xl">
            <span class="font-bold">${cart.count()} item${cart.count() > 1 ? "s" : ""} • ${fmt(cart.subtotal())}</span>

            </span>
          </button>`;
        document.body.appendChild(el);
      }

        const s = cart.state;
        const subtotal = cart.subtotal();
        const deliveryFee = s.items.length ? 39 : 0;
        const taxes = Math.round(subtotal * 0.05);
        const total = subtotal + deliveryFee + taxes;
        const user = getOrCreateUser();
        shell({
          content: `
            <div class="max-w-3xl mx-auto px-4 sm:px-6 py-8">

                    <div class="bg-white border border-ink-100 rounded-2xl divide-y divide-ink-100 anim-fade-up">
                      ${s.items.map((it) => `
                        <div class="p-4 flex items-center gap-4">
                          <img src="${it.image}" class="w-16 h-16 rounded-lg object-cover" />
                          <div class="flex-1 min-w-0">

                              <span class="${it.isVeg ? "veg-dot" : "nonveg-dot"}"></span>
                              <span class="font-semibold text-ink-800 truncate">${escapeHtml(it.name)}</span>

                            <div class="text-sm text-ink-500 mt-0.5">${fmt(it.price)} each</div>
                          </div>
                          <div class="flex items-center bg-brand-50 rounded-lg overflow-hidden">

                        </div>
                      `).join("")}
                    </div>

                    <div class="bg-white border border-ink-100 rounded-2xl p-5 mt-5 anim-fade-up">
                      <h2 class="font-bold text-ink-800 mb-3">Bill summary</h2>
                      <div class="text-sm space-y-2">
                        <div class="flex justify-between"><span class="text-ink-500">Item subtotal</span><span class="font-semibold">${fmt(subtotal)}</span></div>
                        <div class="flex justify-between"><span class="text-ink-500">Delivery fee</span><span class="font-semibold">${fmt(deliveryFee)}</span></div>
                        <div class="flex justify-between"><span class="text-ink-500">Taxes (5%)</span><span class="font-semibold">${fmt(taxes)}</span></div>
                        <div class="border-t border-dashed border-ink-200 my-2"></div>
                        <div class="flex justify-between text-base"><span class="font-bold">To pay</span><span class="font-bold text-brand-600">${fmt(total)}</span></div>
                      </div>
                    </div>

                    <form id="checkout-form" class="bg-white border border-ink-100 rounded-2xl p-5 mt-5 space-y-3 anim-fade-up">
                      <h2 class="font-bold text-ink-800">Delivery details</h2>
                      <input name="name" placeholder="Your name" value="${escapeHtml(user.name === "Guest Foodie" ? "" : user.name)}" required class="w-full px-4 py-3 rounded-xl border border-ink-100 outline-none ring-glow" />
                      <input name="phone" placeholder="Phone number" value="${escapeHtml(user.phone || "")}" required pattern="[0-9 +]{8,}" class="w-full px-4 py-3 rounded-xl border border-ink-100 outline-none ring-glow" />
                      <textarea name="address" placeholder="Delivery address" required class="w-full px-4 py-3 rounded-xl border border-ink-100 outline-none ring-glow" rows="3">${escapeHtml(user.address || "")}</textarea>
                      <button type="submit" class="btn-primary w-full px-5 py-3 rounded-xl text-base">Place order — ${fmt(total)}</button>
                    </form>
                  `
              }
            </div>
          `,
        });

        if (!s.items.length) return;
        document.querySelectorAll("[data-dec]").forEach((b) =>
          b.addEventListener("click", () => { cart.decrement(b.dataset.dec); renderCart(); }),
        );
        document.querySelectorAll("[data-inc-cart]").forEach((b) =>
          b.addEventListener("click", () => {
            const it = cart.state.items.find((i) => i.menuItemId === b.dataset.incCart);
            if (it) {
              const seedItem = SEED_MENU_ITEMS.find((m) => m.id === it.menuItemId);
              cart.add(seedItem || { id: it.menuItemId, name: it.name, price: it.price, image: it.image, isVeg: it.isVeg, restaurantId: it.restaurantId });
              renderCart();
            }
          }),
        );

        $("#checkout-form")?.addEventListener("submit", async (ev) => {
          ev.preventDefault();
          const fd = new FormData(ev.target);
          const name = fd.get("name").toString().trim();
          const phone = fd.get("phone").toString().trim();
          const address = fd.get("address").toString().trim();
          if (!name || !phone || !address) return;
          updateUser({ name, phone, address });
          const cur = cart.state;
          const restaurant = await fetchRestaurant(cur.restaurantId);
          if (!restaurant) {
            toast("Restaurant unavailable", "error");
            return;
          }
          const order = await createOrder({
            userId: getOrCreateUser().id,
            restaurantId: restaurant.id,
            restaurantName: restaurant.name,
            restaurantImage: restaurant.image,
            items: cur.items,
            subtotal,
            deliveryFee,
            taxes,
            total,
            address,
            phone,
          });
          cart.clear();
          toast("Order placed! Tracking now.", "success");
          navigate(`#/orders/${order.id}`);
        });

          if (!orders.length) {
            list.innerHTML = `<div class="bg-white border border-ink-100 rounded-2xl p-10 text-center text-ink-500">No orders yet. <a href="#/" class="text-brand-600 underline">Order something delicious</a>.</div>`;
            return;
          }
          list.classList.add("stagger");
          list.innerHTML = orders.map((o) => `
            <a href="#/orders/${o.id}" class="block card-hover bg-white border border-ink-100 rounded-2xl p-4 flex gap-4 items-center">

              </div>
            </a>`).join("");

        currentCleanup = () => unsub();

      function statusBadgeClass(status) {
        switch (status) {
          case "delivered": return "bg-green-100 text-green-700";
          case "cancelled": return "bg-red-100 text-red-700";
          case "out_for_delivery": return "bg-blue-100 text-blue-700";
          case "preparing": return "bg-amber-100 text-amber-700";
          default: return "bg-ink-100 text-ink-700";
        }
      }

      function renderOrderDetail(orderId) {
        shell({
          content: `<div class="max-w-3xl mx-auto px-4 sm:px-6 py-8" id="order-detail"><div class="text-center text-ink-500 py-12">Loading…</div></div>`,
        });
        const unsub = subscribeOrder(orderId, (o) => {
          const root = $("#order-detail");
          if (!root) return;
          if (!o) {
            root.innerHTML = `<div class="text-center text-ink-500 py-12">Order not found.</div>`;
            return;
          }
          const stages = ["placed", "preparing", "out_for_delivery", "delivered"];
          const idx = o.status === "cancelled" ? -1 : stages.indexOf(o.status);
          const fillPct = idx >= 0 ? Math.round((idx / (stages.length - 1)) * 100) : 0;
          root.innerHTML = `
            <a href="#/orders" class="inline-flex items-center gap-2 text-ink-500 hover:text-ink-800 font-semibold mb-4">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
              Back to orders
            </a>

              <div class="flex items-center gap-4">
                <img src="${o.restaurantImage}" class="w-16 h-16 rounded-xl object-cover" />

                <div class="text-sm text-ink-500">Talk to our customer support team in chat.</div>

      function renderHelp() {

              <div class="bg-gradient-to-r from-brand-500 to-brand-400 text-white rounded-3xl p-8 sm:p-10 mb-8 anim-fade-up flex items-center justify-between gap-4">

                        <svg class="w-5 h-5 transition group-open:rotate-180 text-ink-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>

            el.innerHTML = `<div class="bg-white border border-ink-100 rounded-2xl p-6 text-sm text-ink-500 text-center">You have not opened any tickets yet.</div>`;

              <div class="flex items-center justify-between gap-3">
                <div class="font-semibold text-ink-800 truncate">${escapeHtml(t.problemLabel)}</div>
                <span class="text-xs ${ticketBadgeClass(t.status)} px-2 py-0.5 rounded-full font-semibold whitespace-nowrap">${ticketLabel(t.status)}</span>

      function ticketBadgeClass(s) {
        if (s === "with_agent") return "bg-blue-100 text-blue-700";
        if (s === "resolved") return "bg-green-100 text-green-700";
        return "bg-amber-100 text-amber-700";
      }
      function ticketLabel(s) {
        if (s === "with_agent") return "With agent";
        if (s === "resolved") return "Resolved";
        return "Waiting for agent";
      }

      function iconForCategory(name) {
        const map = {
          package: '<path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0v10l-8 4-8-4V7m16 0l-8 4m0 0L4 7m8 4v10"/>',
          clock: '<path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z"/>',
          chef: '<path stroke-linecap="round" stroke-linejoin="round" d="M5 21h14M7 21V11a5 5 0 1110 0v10"/>',
          card: '<path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M5 6h14a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2z"/>',
          map: '<path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 12.414a4 4 0 10-5.656 5.656L12 22l4.243-4.243a8 8 0 10-11.314-11.314"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>',
          help: '<path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093V14m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>',
        };
        return `<svg class="w-6 h-6 text-brand-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">${map[name] || map.help}</svg>`;
      }

      function renderNewTicket(query) {
        const user = getOrCreateUser();
        const initialOrderId = query.orderId || null;
        let step = 1;
        let problemId = null;
        let orderId = initialOrderId;
        let userOrders = [];

        shell({
          content: `<div class="max-w-3xl mx-auto px-4 sm:px-6 py-8">
            <a href="#/help" class="inline-flex items-center gap-2 text-ink-500 hover:text-ink-800 font-semibold mb-4">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
              Back to Help
            </a>
            <div class="flex items-center gap-3 mb-6 text-sm font-semibold text-ink-500" id="step-indicator"></div>
            <div id="step-body"></div>
          </div>`,
        });

        function indicator() {
          const steps = ["What's the problem?", "Choose the order", "Talk to an agent"];
          $("#step-indicator").innerHTML = steps.map((label, i) => {
            const n = i + 1;
            return `<div class="flex items-center gap-2">
              <div class="w-7 h-7 rounded-full grid place-items-center font-bold text-xs ${n < step ? "bg-green-500 text-white" : n === step ? "bg-brand-500 text-white" : "bg-ink-100 text-ink-400"}">${n < step ? "✓" : n}</div>
              <span class="${n === step ? "text-ink-800" : ""}">${label}</span>
              ${n < 3 ? '<div class="w-6 h-0.5 bg-ink-200 mx-2"></div>' : ""}
            </div>`;
          }).join("");
        }

        function paint() {
          indicator();
          const body = $("#step-body");
          if (step === 1) {
            body.innerHTML = `
              <h1 class="font-display font-extrabold text-2xl text-ink-800 mb-1 anim-fade-up">What's the problem?</h1>
              <p class="text-ink-500 mb-5 anim-fade-up">Pick the option that matches what you are facing.</p>
              <div class="grid sm:grid-cols-2 gap-3 stagger">
                ${SUPPORT_CATEGORIES.map((c) => `
                  <button data-cat="${c.id}" class="text-left bg-white border-2 border-ink-100 hover:border-brand-400 rounded-2xl p-4 transition card-hover">
                    <div class="flex items-start gap-3">
                      <div class="w-10 h-10 rounded-xl bg-brand-50 grid place-items-center shrink-0">${iconForCategory(c.icon)}</div>
                      <div class="flex-1 min-w-0">
                        <div class="font-bold text-ink-800">${escapeHtml(c.label)}</div>
                        <div class="text-sm text-ink-500 mt-0.5">${escapeHtml(c.description)}</div>
                      </div>
                    </div>
                  </button>`).join("")}
              </div>`;
            body.querySelectorAll("[data-cat]").forEach((b) => {
              b.addEventListener("click", () => {
                problemId = b.dataset.cat;
                step = orderId ? 3 : 2;
                paint();
              });
            });
          } else if (step === 2) {
            body.innerHTML = `
              <h1 class="font-display font-extrabold text-2xl text-ink-800 mb-1 anim-fade-up">Choose the order this is about</h1>
              <p class="text-ink-500 mb-5 anim-fade-up">Pick the order so the agent has the right context.</p>
              <div id="ticket-orders" class="space-y-3"><div class="text-ink-500 text-sm">Loading your orders…</div></div>
              <button id="back-step" class="mt-5 text-sm font-semibold text-ink-500 hover:text-ink-800">← Back</button>`;
            $("#back-step").addEventListener("click", () => { step = 1; paint(); });
            const unsub = subscribeUserOrders(user.id, (orders) => {
              userOrders = orders;
              const wrap = $("#ticket-orders");
              if (!wrap) return;
              if (!orders.length) {
                wrap.innerHTML = `<div class="bg-white border border-ink-100 rounded-2xl p-6 text-center text-sm text-ink-500">You have no orders yet. <a class="text-brand-600 underline" href="#/">Place an order first</a>.</div>`;
                return;
              }
              wrap.innerHTML = orders.map((o) => `
                <button data-order="${o.id}" class="w-full text-left bg-white border-2 border-ink-100 hover:border-brand-400 rounded-2xl p-4 flex items-center gap-4 transition">
                  <img src="${o.restaurantImage}" class="w-14 h-14 rounded-xl object-cover" />
                  <div class="flex-1 min-w-0">
                    <div class="font-bold text-ink-800 truncate">${escapeHtml(o.restaurantName)}</div>
                    <div class="text-sm text-ink-500 truncate">${o.items.map((i) => `${i.quantity}× ${i.name}`).join(", ")}</div>
                    <div class="text-xs text-ink-400 mt-1">${fmt(o.total)} • ${timeAgo(o.createdAt)}</div>
                  </div>
                  <span class="text-xs ${statusBadgeClass(o.status)} px-2 py-0.5 rounded-full font-semibold">${STATUS_LABEL[o.status]}</span>
                </button>
              `).join("");
              wrap.querySelectorAll("[data-order]").forEach((b) => {
                b.addEventListener("click", () => {
                  orderId = b.dataset.order;
                  step = 3;
                  unsub();
                  paint();
                });
              });
            });
            currentCleanup = () => unsub();
          } else if (step === 3) {
            const cat = SUPPORT_CATEGORIES.find((c) => c.id === problemId);
            body.innerHTML = `
              <h1 class="font-display font-extrabold text-2xl text-ink-800 mb-1 anim-fade-up">Ready to talk to an agent</h1>
              <p class="text-ink-500 mb-5 anim-fade-up">Confirm the details below — our bot will greet you, then connect you with a real customer support executive.</p>
              <div class="bg-white border border-ink-100 rounded-2xl p-5 anim-fade-up">
                <div class="text-sm uppercase tracking-wide text-ink-400 font-semibold">Issue</div>
                <div class="font-bold text-ink-800 mt-1">${escapeHtml(cat?.label || "")}</div>
                <div id="order-preview" class="mt-4 text-sm text-ink-500">Loading order details…</div>
              </div>
              <button id="open-chat" class="btn-primary w-full mt-5 px-6 py-3.5 rounded-xl text-base">Connect me to a support executive</button>
              <button id="back-step" class="mt-3 text-sm font-semibold text-ink-500 hover:text-ink-800">← Choose a different option</button>`;

            $("#back-step").addEventListener("click", () => { step = orderId && initialOrderId ? 1 : 2; paint(); });

            (async () => {
              const ord = userOrders.find((o) => o.id === orderId) || (await new Promise((res) => {
                const u = subscribeOrder(orderId, (o) => { u(); res(o); });
              }));
              const op = $("#order-preview");
              if (!op) return;
              if (!ord) {
                op.innerHTML = "Order not found.";
                return;
              }
              op.innerHTML = `
                <div class="text-sm uppercase tracking-wide text-ink-400 font-semibold">Order</div>
                <div class="flex items-center gap-3 mt-1">
                  <img src="${ord.restaurantImage}" class="w-12 h-12 rounded-lg object-cover" />
                  <div>
                    <div class="font-bold text-ink-800">${escapeHtml(ord.restaurantName)}</div>
                    <div class="text-xs text-ink-500">${fmt(ord.total)} • ${timeAgo(ord.createdAt)}</div>
                  </div>
                </div>`;
            })();

            $("#open-chat").addEventListener("click", async () => {
              const btn = $("#open-chat");
              btn.disabled = true;
              btn.textContent = "Connecting…";
              const ord = userOrders.find((o) => o.id === orderId) || (await new Promise((res) => {
                const u = subscribeOrder(orderId, (o) => { u(); res(o); });
              }));
              const t = await createSupportTicket({
                userId: user.id,
                userName: user.name,
                orderId,
                orderRestaurantName: ord ? ord.restaurantName : "Unknown restaurant",
                problem: problemId,
                problemLabel: findCategoryLabel(problemId),
              });
              navigate(`#/help/chat/${t.id}`);
            });
          }
        }
        paint();
      }

      function renderChat(ticketId) {
        shell({
          content: `<div class="max-w-3xl mx-auto px-4 sm:px-6 py-6 flex flex-col" style="min-height:calc(100vh - 200px)">
            <a href="#/help" class="inline-flex items-center gap-2 text-ink-500 hover:text-ink-800 font-semibold mb-4">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
              Back to Help
            </a>
            <div class="bg-white border border-ink-100 rounded-2xl flex flex-col flex-1 overflow-hidden anim-fade-up">
              <div id="chat-header" class="p-4 border-b border-ink-100 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-brand-500 grid place-items-center text-white font-bold">R</div>
                <div class="flex-1 min-w-0">
                  <div class="font-bold text-ink-800">Rajateats Support</div>
                  <div id="chat-status" class="text-xs text-ink-500">Connecting…</div>
                </div>
              </div>
              <div id="chat-body" class="flex-1 overflow-y-auto p-4 space-y-3 bg-ink-50/50"></div>
              <div id="chat-footer"></div>
            </div>
          </div>`,
        });

        const user = getOrCreateUser();
        let currentTicket = null;

        function renderFooter() {
          const footer = $("#chat-footer");
          if (!footer) return;
          if (currentTicket && currentTicket.status === "resolved") {
            footer.innerHTML = `
              <div class="border-t border-ink-100 p-5 bg-ink-50 text-center">
                <div class="inline-flex items-center gap-2 text-ink-700 font-bold">
                  <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                  Chat is marked as closed
                </div>
                <p class="text-sm text-ink-500 mt-1">If you need more help, please drop a mail on
                  <a href="mailto:rajateats@support.in" class="text-brand-600 font-semibold underline">rajateats@support.in</a>
                </p>
              </div>`;
          } else {
            footer.innerHTML = `
              <form id="chat-form" class="border-t border-ink-100 p-3 flex items-center gap-2 bg-white">
                <input id="chat-input" placeholder="Type your message…" autocomplete="off" class="flex-1 px-4 py-3 rounded-xl bg-ink-50 outline-none ring-glow" />
                <button class="btn-primary px-5 py-3 rounded-xl">Send</button>
              </form>`;
            $("#chat-form").addEventListener("submit", async (ev) => {
              ev.preventDefault();
              const input = $("#chat-input");
              const text = input.value.trim();
              if (!text) return;
              input.value = "";
              await postSupportMessage(ticketId, { sender: "user", text, createdAt: Date.now() });
            });
          }
        }

        const unsubT = subscribeTicket(ticketId, (t) => {
          const prevStatus = currentTicket?.status;
          currentTicket = t;
          if (!t) {
            $("#chat-status").textContent = "Ticket not found.";
            return;
          }
          $("#chat-status").textContent =
            t.status === "with_agent" ? `With ${t.agentName || "agent"} · online now` :
            t.status === "resolved" ? "This conversation has been closed" :
            "Waiting for an executive…";
          if (prevStatus !== t.status) renderFooter();
        });
        const unsubM = subscribeTicketMessages(ticketId, (messages) => {
          const body = $("#chat-body");
          if (!body) return;
          const showTyping = currentTicket && currentTicket.status === "waiting_agent";
          body.innerHTML = `
            ${messages.map((m) => chatBubble(m, user.id)).join("")}
            ${showTyping ? `
              <div class="flex items-end gap-2 chat-bubble">
                <div class="w-7 h-7 rounded-full bg-brand-500 grid place-items-center text-white text-xs font-bold">R</div>
                <div class="bg-white border border-ink-100 rounded-2xl rounded-bl-sm px-4 py-3 flex items-center gap-1">
                  <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
                </div>
              </div>` : ""}
          `;
          body.scrollTop = body.scrollHeight;
        });
        currentCleanup = () => { unsubT(); unsubM(); };
        renderFooter();
      }

      function chatBubble(m, userId) {
        if (m.sender === "user") {
          return `<div class="flex justify-end chat-bubble">
            <div class="bg-brand-500 text-white rounded-2xl rounded-br-sm px-4 py-2.5 max-w-[80%] text-sm shadow-sm">${escapeHtml(m.text)}</div>
          </div>`;
        }
        const isAgent = m.sender === "agent";
        const initial = isAgent ? (m.agentName?.[0] || "A") : "R";
        const bubbleClass = isAgent ? "bg-blue-50 border-blue-100" : "bg-white border-ink-100";
        const labelClass = isAgent ? "text-blue-700" : "text-brand-700";
        return `<div class="flex items-end gap-2 chat-bubble">
          <div class="w-7 h-7 rounded-full ${isAgent ? "bg-blue-500" : "bg-brand-500"} grid place-items-center text-white text-xs font-bold">${escapeHtml(initial)}</div>
          <div class="${bubbleClass} border rounded-2xl rounded-bl-sm px-4 py-2.5 max-w-[80%] text-sm shadow-sm">
            <div class="text-[11px] font-bold ${labelClass} mb-0.5">${isAgent ? escapeHtml(m.agentName || "Agent") : "Rajateats Bot"}</div>
            ${escapeHtml(m.text)}
          </div>
        </div>`;
      }

      function renderProfile() {
        const user = getOrCreateUser();
        shell({
          content: `<div class="max-w-xl mx-auto px-4 sm:px-6 py-8">
            <h1 class="font-display font-extrabold text-3xl text-ink-800 mb-6 anim-fade-up">Your profile</h1>
            <form id="profile-form" class="bg-white border border-ink-100 rounded-2xl p-6 space-y-3 anim-fade-up">
              <label class="block">
                <span class="text-sm font-semibold text-ink-700">Name</span>
                <input name="name" class="w-full mt-1 px-4 py-3 rounded-xl border border-ink-100 outline-none ring-glow" value="${escapeHtml(user.name === "Guest Foodie" ? "" : user.name)}" placeholder="Your name" />
              </label>
              <label class="block">
                <span class="text-sm font-semibold text-ink-700">Phone</span>
                <input name="phone" class="w-full mt-1 px-4 py-3 rounded-xl border border-ink-100 outline-none ring-glow" value="${escapeHtml(user.phone || "")}" placeholder="Phone number" />
              </label>
              <label class="block">
                <span class="text-sm font-semibold text-ink-700">Default delivery address</span>
                <textarea name="address" class="w-full mt-1 px-4 py-3 rounded-xl border border-ink-100 outline-none ring-glow" rows="3" placeholder="Address">${escapeHtml(user.address || "")}</textarea>
              </label>
              <button class="btn-primary w-full px-5 py-3 rounded-xl">Save</button>
            </form>
          </div>`,
        });
        $("#profile-form").addEventListener("submit", (ev) => {
          ev.preventDefault();
          const fd = new FormData(ev.target);
          updateUser({
            name: (fd.get("name") || "").toString().trim() || "Guest Foodie",
            phone: (fd.get("phone") || "").toString().trim(),
            address: (fd.get("address") || "").toString().trim(),
          });
          toast("Profile saved", "success");
        });
      }

      function renderAgentLogin() {
        if (getAgent()) { navigate("#/agent"); return; }
        shell({
          agentMode: true,
          content: `
            <div class="max-w-md mx-auto px-4 sm:px-6 py-16">
              <div class="bg-white border border-ink-100 rounded-2xl p-8 anim-fade-up">
                <div class="w-14 h-14 rounded-full bg-brand-50 grid place-items-center mx-auto mb-4">
                  <svg class="w-7 h-7 text-brand-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                </div>
                <h1 class="font-display font-bold text-2xl text-center text-ink-800">Executive Login</h1>
                <p class="text-center text-ink-500 mt-1">Enter your name to start resolving customer tickets.</p>
                <form id="login-form" class="mt-6 space-y-3">
                  <label class="block">
                    <span class="text-sm font-semibold text-ink-700">Full name</span>
                    <input name="name" required placeholder="e.g. Rahul Sharma" class="w-full mt-1 px-4 py-3 rounded-xl border border-ink-100 outline-none ring-glow" />
                  </label>
                  <button class="btn-primary w-full px-5 py-3 rounded-xl">Continue to portal</button>
                </form>
              </div>
            </div>
          `,
        });
        $("#login-form").addEventListener("submit", (ev) => {
          ev.preventDefault();
          const name = new FormData(ev.target).get("name").toString().trim();
          if (!name) return;
          loginAgent(name);
          navigate("#/agent");
        });
      }

      function renderAgentPanel() {
        const agent = getAgent();
        if (!agent) { navigate("#/agent/login"); return; }
        shell({
          agentMode: true,
          content: `<div class="max-w-[1500px] mx-auto px-3 sm:px-4 py-4 grid xl:grid-cols-[320px_minmax(0,1fr)_360px] lg:grid-cols-[300px_minmax(0,1fr)] gap-4" style="min-height:calc(100vh - 64px)">
            <aside class="bg-white border border-ink-100 rounded-2xl flex flex-col overflow-hidden shadow-sm">
              <div class="p-4 border-b border-ink-100">
                <div class="flex items-center justify-between mb-3">
                  <h2 class="font-display font-bold text-lg text-ink-800">Inbox</h2>
                  <span id="ticket-count" class="text-xs font-semibold bg-ink-100 text-ink-600 px-2 py-0.5 rounded-full"></span>
                </div>
                <input id="ticket-search" placeholder="Search by name, problem..." class="w-full text-sm px-3 py-2 rounded-lg bg-ink-50 outline-none ring-glow" />
                <div class="mt-3 flex bg-ink-50 rounded-lg p-1 text-xs font-semibold">
                  <button data-filter="waiting" class="filter-btn flex-1 py-1.5 rounded-md">Waiting</button>
                  <button data-filter="mine" class="filter-btn flex-1 py-1.5 rounded-md">With me</button>
                  <button data-filter="all" class="filter-btn flex-1 py-1.5 rounded-md">All</button>
                  <button data-filter="resolved" class="filter-btn flex-1 py-1.5 rounded-md">Closed</button>
                </div>
              </div>
              <div id="ticket-list" class="flex-1 overflow-y-auto"></div>
              <div class="p-3 border-t border-ink-100 text-[11px] text-ink-400 text-center">Auto-refresh enabled</div>
            </aside>

            <section id="ticket-detail" class="bg-white border border-ink-100 rounded-2xl flex flex-col overflow-hidden shadow-sm" style="min-height:600px">
              <div class="text-center text-ink-500 py-20 px-6 m-auto max-w-sm">
                <div class="w-14 h-14 mx-auto rounded-2xl bg-brand-50 grid place-items-center mb-3">
                  <svg class="w-7 h-7 text-brand-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                </div>
                <div class="font-display font-bold text-lg text-ink-700">Welcome ${escapeHtml(agent.name.split(" ")[0])}</div>
                <p class="mt-1 text-sm text-ink-500">Pick a ticket from the inbox to view the conversation, customer history and order details.</p>
              </div>
            </section>

            <aside id="customer-pane" class="hidden xl:flex bg-white border border-ink-100 rounded-2xl flex-col overflow-hidden shadow-sm">
              <div class="p-6 text-center text-sm text-ink-500">Customer details will appear here once you open a ticket.</div>
            </aside>
          </div>`,
        });

        let allTickets = [];
        let activeFilter = "waiting";
        let searchQuery = "";
        let selectedTicketId = null;
        let unsubMessages = null;
        let unsubTicket = null;

        function applyFilterButtons() {
          document.querySelectorAll(".filter-btn").forEach((b) => {
            const active = b.dataset.filter === activeFilter;
            b.className = `filter-btn flex-1 py-1.5 rounded-md transition ${active ? "bg-white shadow-sm text-ink-800" : "text-ink-500 hover:text-ink-700"}`;
          });
        }
        function filterTickets() {
          let list = allTickets;
          if (activeFilter === "waiting") list = list.filter((t) => t.status === "waiting_agent");
          else if (activeFilter === "mine") list = list.filter((t) => t.agentId === agent.id && t.status !== "resolved");
          else if (activeFilter === "resolved") list = list.filter((t) => t.status === "resolved");
          if (searchQuery) {
            const q = searchQuery.toLowerCase();
            list = list.filter((t) =>
              (t.userName || "").toLowerCase().includes(q) ||
              (t.problemLabel || "").toLowerCase().includes(q) ||
              (t.orderRestaurantName || "").toLowerCase().includes(q),
            );
          }
          return list;
        }
        function renderTicketList() {
          const list = $("#ticket-list");
          const filtered = filterTickets();
          $("#ticket-count").textContent = filtered.length;
          if (!filtered.length) {
            list.innerHTML = `<div class="text-center text-sm text-ink-500 py-12 px-6">
              <div class="font-semibold text-ink-600">No tickets here</div>
              <p class="mt-1">Try a different filter or wait for new tickets.</p>
            </div>`;
            return;
          }
          list.innerHTML = filtered.map((t) => {
            const initial = (t.userName || "C").trim()[0].toUpperCase();
            const selected = t.id === selectedTicketId;
            const dot = t.status === "waiting_agent" ? "bg-amber-500 animate-pulse" : t.status === "with_agent" ? "bg-blue-500" : "bg-green-500";
            return `
              <button data-tid="${t.id}" class="w-full text-left px-4 py-3 border-b border-ink-100 hover:bg-ink-50 transition relative ${selected ? "bg-brand-50/70" : ""}">
                ${selected ? '<div class="absolute left-0 top-0 bottom-0 w-1 bg-brand-500"></div>' : ""}
                <div class="flex items-start gap-3">
                  <div class="relative shrink-0">
                    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-white font-bold grid place-items-center text-sm">${escapeHtml(initial)}</div>
                    <span class="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full ${dot} ring-2 ring-white"></span>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between gap-2">
                      <div class="font-bold text-ink-800 truncate text-sm">${escapeHtml(t.userName || "Customer")}</div>
                      <div class="text-[10px] text-ink-400 whitespace-nowrap">${timeAgo(t.updatedAt)}</div>
                    </div>
                    <div class="text-xs text-ink-600 truncate font-medium mt-0.5">${escapeHtml(t.problemLabel)}</div>
                    <div class="text-[11px] text-ink-400 truncate mt-0.5">${escapeHtml(t.lastMessagePreview || "—")}</div>
                  </div>
                </div>
              </button>`;
          }).join("");
          list.querySelectorAll("[data-tid]").forEach((b) => {
            b.addEventListener("click", () => {
              selectedTicketId = b.dataset.tid;
              renderTicketList();
              openTicketDetail(selectedTicketId);
            });
          });
        }

        async function openTicketDetail(ticketId) {
          if (unsubMessages) unsubMessages();
          if (unsubTicket) unsubTicket();
          const root = $("#ticket-detail");
          const cust = $("#customer-pane");
          root.innerHTML = `<div class="text-center text-ink-500 py-12 m-auto">Loading conversation…</div>`;
          if (cust) cust.innerHTML = `<div class="p-6 text-center text-sm text-ink-500">Loading customer profile…</div>`;
          let ticket = null;
          let messages = [];
          let userOrders = [];
          let userTickets = [];
          let orderForTicket = null;
          let dataLoadedOnce = false;

          unsubTicket = subscribeTicket(ticketId, (t) => {
            ticket = t;
            paintDetail();
          });
          unsubMessages = subscribeTicketMessages(ticketId, (m) => {
            messages = m;
            paintDetail(true);
          });

          async function loadProfileAndOrder() {
            if (!ticket) return;
            const [orders, tickets] = await Promise.all([
              fetchUserOrdersOnce(ticket.userId),
              fetchUserTicketsOnce(ticket.userId),
            ]);
            userOrders = orders;
            userTickets = tickets;
            orderForTicket = orders.find((o) => o.id === ticket.orderId) || null;
            dataLoadedOnce = true;
            paintCustomerPane();
          }

          function paintDetail(messagesOnly = false) {
            if (!ticket) return;
            if (!dataLoadedOnce) loadProfileAndOrder();
            const isMine = ticket.agentId === agent.id;
            const claimedByOther = ticket.status === "with_agent" && !isMine;
            const canClaim = ticket.status === "waiting_agent";
            const canReply = isMine && ticket.status === "with_agent";
            const canResolve = isMine && ticket.status === "with_agent";
            const initial = (ticket.userName || "C").trim()[0].toUpperCase();

            if (!messagesOnly) {
              root.innerHTML = `
                <div class="border-b border-ink-100 px-5 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 bg-white">
                  <div class="flex items-center gap-3 min-w-0">
                    <div class="w-11 h-11 rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-white font-bold grid place-items-center">${escapeHtml(initial)}</div>
                    <div class="min-w-0">
                      <div class="font-display font-bold text-lg text-ink-800 truncate">${escapeHtml(ticket.userName || "Customer")}</div>
                      <div class="text-xs text-ink-500 truncate flex items-center gap-2">
                        <span class="text-xs ${ticketBadgeClass(ticket.status)} px-2 py-0.5 rounded-full font-semibold">${ticketLabel(ticket.status)}</span>
                        <span>·</span>
                        <span class="truncate">${escapeHtml(ticket.problemLabel)}</span>
                      </div>
                    </div>
                  </div>
                  <div class="flex items-center gap-2 flex-wrap">
                    <div class="text-[11px] text-ink-400 hidden sm:block">Ticket #${ticket.id.slice(-6).toUpperCase()}</div>
                    ${canClaim ? `<button id="claim-btn" class="btn-primary px-4 py-2 rounded-lg text-sm">Claim ticket</button>` : ""}
                    ${canResolve ? `<button id="resolve-btn" class="border border-green-500 text-green-700 hover:bg-green-50 font-semibold px-3 py-1.5 rounded-lg text-sm transition">Mark closed</button>` : ""}
                    <button id="show-customer" class="xl:hidden border border-ink-200 text-ink-700 hover:bg-ink-50 font-semibold px-3 py-1.5 rounded-lg text-sm transition">Details</button>
                  </div>
                </div>
                <div id="agent-chat-body" class="flex-1 overflow-y-auto p-5 space-y-3 bg-gradient-to-b from-ink-50/40 to-ink-50/10"></div>
                <div id="quick-replies-bar"></div>
                <div id="agent-input-bar"></div>
              `;
              $("#claim-btn")?.addEventListener("click", async () => {
                try { await claimTicket(ticket.id, agent.id, agent.name); toast("Ticket claimed", "success"); }
                catch (e) { toast(e.message || "Failed to claim", "error"); }
              });
              $("#resolve-btn")?.addEventListener("click", async () => {
                if (!confirm("Mark this ticket as closed? The customer's chat will be locked.")) return;
                await setTicketStatus(ticket.id, "resolved", agent.name);
                toast("Ticket closed", "success");
              });
              $("#show-customer")?.addEventListener("click", () => {
                const pane = $("#customer-pane");
                pane.classList.toggle("hidden");
                pane.classList.toggle("xl:flex");
                pane.classList.toggle("flex");
              });
              renderQuickReplies(canReply);
              renderInputBar(canReply, claimedByOther);
            }

            const body = $("#agent-chat-body");
            if (body) {
              body.innerHTML = messages.map((m) => agentChatBubble(m, agent.id)).join("");
              body.scrollTop = body.scrollHeight;
            }
          }

          function renderQuickReplies(canReply) {
            const bar = $("#quick-replies-bar");
            if (!bar) return;
            if (!canReply) { bar.innerHTML = ""; return; }
            bar.innerHTML = `
              <div class="border-t border-ink-100 bg-white px-4 py-2.5">
                <div class="flex items-center gap-2 mb-2">
                  <span class="text-[10px] uppercase tracking-wider font-bold text-ink-400">Quick replies</span>
                </div>
                <div class="flex gap-2 overflow-x-auto scrollbar-hide pb-1">
                  ${QUICK_REPLIES.map((q) => `
                    <button data-qr="${q.id}" class="shrink-0 text-xs font-semibold text-ink-700 border border-ink-200 hover:border-brand-400 hover:bg-brand-50 hover:text-brand-700 px-3 py-1.5 rounded-full transition">${escapeHtml(q.label)}</button>
                  `).join("")}
                </div>
              </div>`;
            bar.querySelectorAll("[data-qr]").forEach((b) =>
              b.addEventListener("click", async () => {
                const q = QUICK_REPLIES.find((x) => x.id === b.dataset.qr);
                if (!q) return;
                const text = q.text.replace("{agent}", agent.name);
                await postSupportMessage(ticket.id, { sender: "agent", agentName: agent.name, text, createdAt: Date.now() });
                if (q.id === "thanks") {
                  setTimeout(async () => {
                    if (confirm("Mark this ticket as closed now?")) {
                      await setTicketStatus(ticket.id, "resolved", agent.name);
                      toast("Ticket closed", "success");
                    }
                  }, 200);
                }
              }),
            );
          }
          function renderInputBar(canReply, claimedByOther) {
            const bar = $("#agent-input-bar");
            if (!bar) return;
            if (canReply) {
              bar.innerHTML = `
                <form id="agent-reply-form" class="border-t border-ink-100 p-3 flex items-center gap-2 bg-white">
                  <input id="agent-reply-input" autocomplete="off" placeholder="Reply as ${escapeHtml(agent.name)}…" class="flex-1 px-4 py-3 rounded-xl bg-ink-50 outline-none ring-glow" />
                  <button class="btn-primary px-5 py-3 rounded-xl">Send</button>
                </form>`;
              $("#agent-reply-form").addEventListener("submit", async (ev) => {
                ev.preventDefault();
                const input = $("#agent-reply-input");
                const text = input.value.trim();
                if (!text) return;
                input.value = "";
                await postSupportMessage(ticket.id, { sender: "agent", agentName: agent.name, text, createdAt: Date.now() });
              });
            } else if (claimedByOther) {
              bar.innerHTML = `<div class="border-t border-ink-100 p-3 text-sm text-center text-ink-500 bg-ink-50/40">
                Being handled by <span class="font-semibold text-ink-700">${escapeHtml(ticket.agentName || "another agent")}</span>.
              </div>`;
            } else if (ticket.status === "resolved") {
              bar.innerHTML = `<div class="border-t border-ink-100 p-3 text-sm text-center text-ink-500 bg-green-50/60">
                <span class="font-semibold text-green-700">Conversation closed.</span> The customer was advised to email rajateats@support.in.
              </div>`;
            } else {
              bar.innerHTML = `<div class="border-t border-ink-100 p-3 text-sm text-center text-ink-500 bg-amber-50/60">
                Claim this ticket to start replying.
              </div>`;
            }
          }

          function paintCustomerPane() {
            const pane = $("#customer-pane");
            if (!pane || !ticket) return;
            const trustScore = computeTrustScore(userOrders, userTickets);
            const badge = trustBadge(trustScore, userOrders.length);
            const totalSpend = userOrders.filter((o) => o.status !== "cancelled").reduce((s, o) => s + o.total, 0);
            const orderCount = userOrders.length;
            const completed = userOrders.filter((o) => o.status === "delivered").length;
            const cancelled = userOrders.filter((o) => o.status === "cancelled").length;
            const ticketsTotal = userTickets.length;
            const ringColor = trustScore >= 85 ? "stroke-green-500" : trustScore >= 60 ? "stroke-blue-500" : trustScore >= 40 ? "stroke-amber-500" : "stroke-red-500";
            const initial = (ticket.userName || "C").trim()[0].toUpperCase();
            const ord = orderForTicket;
            pane.classList.remove("hidden");
            pane.classList.add("flex");
            pane.innerHTML = `
              <div class="flex-1 overflow-y-auto">
                <div class="p-5 border-b border-ink-100">
                  <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-white font-bold grid place-items-center text-lg">${escapeHtml(initial)}</div>
                    <div class="min-w-0">
                      <div class="font-display font-bold text-base text-ink-800 truncate">${escapeHtml(ticket.userName || "Customer")}</div>
                      <div class="text-xs text-ink-500 truncate">Customer ID: ${escapeHtml(ticket.userId.slice(-8))}</div>
                    </div>
                  </div>
                  ${ord && ord.phone ? `<div class="mt-3 text-xs text-ink-500 flex items-center gap-2"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h2.28a1 1 0 01.95.68l1.5 4.49a1 1 0 01-.5 1.21l-2.26 1.13a11 11 0 005.52 5.52l1.13-2.26a1 1 0 011.21-.5l4.49 1.5a1 1 0 01.68.95V19a2 2 0 01-2 2h-1C9.72 21 3 14.28 3 6V5z"/></svg>${escapeHtml(ord.phone)}</div>` : ""}
                </div>

                <div class="p-5 border-b border-ink-100">
                  <div class="text-[10px] uppercase tracking-wider font-bold text-ink-400 mb-3">Customer trust score</div>
                  <div class="flex items-center gap-4">
                    <div class="relative w-20 h-20 shrink-0">
                      <svg class="w-20 h-20 -rotate-90" viewBox="0 0 80 80">
                        <circle cx="40" cy="40" r="34" stroke="#ece5dc" stroke-width="8" fill="none" />
                        <circle cx="40" cy="40" r="34" class="${ringColor}" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="${(trustScore / 100) * 213.6} 213.6" />
                      </svg>
                      <div class="absolute inset-0 grid place-items-center font-display font-extrabold text-xl text-ink-800">${trustScore}</div>
                    </div>
                    <div class="min-w-0">
                      <div class="inline-block text-[11px] font-bold px-2 py-1 rounded-full border ${badge.color}">${badge.label}</div>
                      <div class="text-xs text-ink-500 mt-1.5">Based on ${orderCount} orders and ${ticketsTotal} tickets</div>
                    </div>
                  </div>
                  <div class="grid grid-cols-3 gap-2 mt-4 text-center">
                    <div class="bg-ink-50 rounded-lg py-2">
                      <div class="font-bold text-ink-800 text-sm">${orderCount}</div>
                      <div class="text-[10px] text-ink-500 uppercase tracking-wide">Orders</div>
                    </div>
                    <div class="bg-ink-50 rounded-lg py-2">
                      <div class="font-bold text-ink-800 text-sm">${fmt(totalSpend)}</div>
                      <div class="text-[10px] text-ink-500 uppercase tracking-wide">Lifetime</div>
                    </div>
                    <div class="bg-ink-50 rounded-lg py-2">
                      <div class="font-bold text-ink-800 text-sm">${ticketsTotal}</div>
                      <div class="text-[10px] text-ink-500 uppercase tracking-wide">Tickets</div>
                    </div>
                  </div>
                  <div class="grid grid-cols-2 gap-2 mt-2 text-xs text-ink-600">
                    <div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-green-500"></span>${completed} delivered</div>
                    <div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-red-500"></span>${cancelled} cancelled</div>
                  </div>
                </div>

                ${ord ? `
                  <div class="p-5 border-b border-ink-100">
                    <div class="flex items-center justify-between mb-3">
                      <div class="text-[10px] uppercase tracking-wider font-bold text-ink-400">Order in question</div>
                      <span class="text-[10px] ${statusBadgeClass(ord.status)} px-2 py-0.5 rounded-full font-semibold">${STATUS_LABEL[ord.status]}</span>
                    </div>
                    <div class="flex items-center gap-3">
                      <img src="${ord.restaurantImage}" class="w-12 h-12 rounded-lg object-cover shrink-0" />
                      <div class="min-w-0">
                        <div class="font-bold text-sm text-ink-800 truncate">${escapeHtml(ord.restaurantName)}</div>
                        <div class="text-[11px] text-ink-500">#${ord.id.slice(-6).toUpperCase()} · ${timeAgo(ord.createdAt)}</div>
                      </div>
                    </div>
                    <div class="mt-3 space-y-1.5">
                      ${ord.items.map((it) => `
                        <div class="flex items-center justify-between text-xs">
                          <div class="flex items-center gap-2 min-w-0">
                            <span class="${it.isVeg ? "veg-dot" : "nonveg-dot"} shrink-0" style="width:11px;height:11px"></span>
                            <span class="truncate">${it.quantity} × ${escapeHtml(it.name)}</span>
                          </div>
                          <span class="font-semibold shrink-0 ml-2">${fmt(it.price * it.quantity)}</span>
                        </div>`).join("")}
                    </div>
                    <div class="border-t border-dashed border-ink-200 my-3"></div>
                    <div class="space-y-1 text-xs">
                      <div class="flex justify-between text-ink-500"><span>Subtotal</span><span>${fmt(ord.subtotal)}</span></div>
                      <div class="flex justify-between text-ink-500"><span>Delivery</span><span>${fmt(ord.deliveryFee)}</span></div>
                      <div class="flex justify-between text-ink-500"><span>Taxes</span><span>${fmt(ord.taxes)}</span></div>
                      <div class="flex justify-between font-bold text-ink-800 pt-1"><span>Total paid</span><span class="text-brand-600">${fmt(ord.total)}</span></div>
                    </div>
                    <div class="mt-3 text-xs">
                      <div class="text-[10px] uppercase tracking-wider font-bold text-ink-400 mb-1">Delivery address</div>
                      <div class="text-ink-700 leading-snug">${escapeHtml(ord.address || "—")}</div>
                    </div>
                    <div class="mt-3 grid grid-cols-2 gap-2">
                      <button id="copy-order" class="text-xs font-semibold border border-ink-200 hover:bg-ink-50 px-2 py-1.5 rounded-lg">Copy order ID</button>
                      ${(ord.status === "placed" || ord.status === "preparing") ? `<button id="cancel-order-btn" class="text-xs font-semibold border border-red-300 text-red-600 hover:bg-red-50 px-2 py-1.5 rounded-lg">Cancel order</button>` : `<div></div>`}
                    </div>
                  </div>
                ` : `<div class="p-5 border-b border-ink-100 text-xs text-ink-500">No order linked to this ticket.</div>`}

                <div class="p-5">
                  <div class="text-[10px] uppercase tracking-wider font-bold text-ink-400 mb-2">Recent orders</div>
                  ${userOrders.slice(0, 4).map((o) => `
                    <div class="flex items-center gap-2 py-2 border-b border-ink-100 last:border-0">
                      <img src="${o.restaurantImage}" class="w-8 h-8 rounded-md object-cover" />
                      <div class="flex-1 min-w-0">
                        <div class="text-xs font-semibold text-ink-800 truncate">${escapeHtml(o.restaurantName)}</div>
                        <div class="text-[10px] text-ink-500">${fmt(o.total)} · ${timeAgo(o.createdAt)}</div>
                      </div>
                      <span class="text-[9px] ${statusBadgeClass(o.status)} px-1.5 py-0.5 rounded-full font-semibold">${STATUS_LABEL[o.status]}</span>
                    </div>`).join("") || `<div class="text-xs text-ink-500">No earlier orders.</div>`}
                </div>
              </div>
            `;
            $("#copy-order")?.addEventListener("click", () => {
              navigator.clipboard?.writeText(ord.id);
              toast("Order ID copied", "success");
            });
            $("#cancel-order-btn")?.addEventListener("click", async () => {
              if (!confirm("Cancel this customer's order?")) return;
              await cancelOrder(ord.id);
              await postSupportMessage(ticket.id, { sender: "agent", agentName: agent.name, text: "I have cancelled your order. A full refund has been initiated and will reflect in 3 to 5 business days.", createdAt: Date.now() });
              toast("Order cancelled and customer notified", "success");
              loadProfileAndOrder();
            });
          }
        }

        $("#ticket-search").addEventListener("input", (ev) => { searchQuery = ev.target.value; renderTicketList(); });
        document.querySelectorAll(".filter-btn").forEach((b) =>
          b.addEventListener("click", () => { activeFilter = b.dataset.filter; applyFilterButtons(); renderTicketList(); }),
        );
        applyFilterButtons();

        const unsubAll = subscribeAllTickets((tickets) => {
          allTickets = tickets;
          renderTicketList();
        });
        currentCleanup = () => {
          unsubAll();
          if (unsubMessages) unsubMessages();
          if (unsubTicket) unsubTicket();
        };
      }

      function agentChatBubble(m, agentId) {
        if (m.sender === "user") {
          return `<div class="flex items-end gap-2 chat-bubble">
            <div class="w-7 h-7 rounded-full bg-ink-700 grid place-items-center text-white text-xs font-bold">U</div>
            <div class="bg-white border border-ink-100 rounded-2xl rounded-bl-sm px-4 py-2.5 max-w-[80%] text-sm shadow-sm">
              <div class="text-[11px] font-bold text-ink-700 mb-0.5">Customer · ${new Date(m.createdAt).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}</div>
              ${escapeHtml(m.text)}
            </div>
          </div>`;
        }
        if (m.sender === "bot") {
          return `<div class="flex items-end gap-2 chat-bubble">
            <div class="w-7 h-7 rounded-full bg-brand-500 grid place-items-center text-white text-xs font-bold">R</div>
            <div class="bg-white border border-ink-100 rounded-2xl rounded-bl-sm px-4 py-2.5 max-w-[80%] text-sm shadow-sm">
              <div class="text-[11px] font-bold text-brand-700 mb-0.5">Rajateats Bot · ${new Date(m.createdAt).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}</div>
              ${escapeHtml(m.text)}
            </div>
          </div>`;
        }
        return `<div class="flex justify-end chat-bubble">
          <div class="bg-blue-500 text-white rounded-2xl rounded-br-sm px-4 py-2.5 max-w-[80%] text-sm shadow-sm">
            <div class="text-[11px] font-bold text-blue-100 mb-0.5">${escapeHtml(m.agentName || "Agent")} · ${new Date(m.createdAt).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}</div>
            ${escapeHtml(m.text)}
          </div>
        </div>`;
      }

      function renderNotFound() {
        shell({
          content: `<div class="max-w-md mx-auto px-4 py-24 text-center">
            <div class="font-display font-extrabold text-5xl text-ink-800">404</div>
            <p class="text-ink-500 mt-2">That page is off the menu.</p>
            <a href="#/" class="btn-primary inline-flex mt-5 px-5 py-2.5 rounded-xl">Back to home</a>
          </div>`,
        });
      }

      // -----------------------------------------------------------------------
      // Boot
      // -----------------------------------------------------------------------
      const user = getOrCreateUser();
      startOrderTicker(user.id);
      ensureSeeded();
      window.addEventListener("cart-updated", () => {
        // Re-render top-level shells that show cart count if the route is on cart-affected pages
        const { segments } = parseRoute();
        if (segments.length === 0 || (segments[0] === "restaurant" && segments.length === 2) || (segments[0] === "cart")) {
          handleRoute();
        }
      });
      handleRoute();
    </script>
  </body>
</html>
